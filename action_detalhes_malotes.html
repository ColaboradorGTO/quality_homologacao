<div>

      class="text-dark fw-500"></span></h6>

  <h6 class="text-dark fw-900">Usuário Criação: <span id="usuarioCriacaoMalote" class="text-dark fw-500"></span></h6>
  <h6 class="text-dark fw-900">Data Criação: <span id="dataCriacaoMalote" class="text-dark fw-500"></span></h6>
  <h6 class="text-dark fw-900">Usuário Envio: <span id="usuarioEnviadoMalote" class="text-dark fw-500"></span></h6>

  <h6 class="text-dark fw-900">Data Recepção: <span id="dataRecepcaoMalote" class="text-dark fw-500"></span></h6>
  <h6 class="text-dark fw-900">Usuário Conferência: <span id="usuarioConferenciaMalote" class="text-dark fw-500"></span>
  </h6>
  <h6 class="text-dark fw-900">Data Conferência: <span id="dataConferenciaMalote" class="text-dark fw-500"></span></h6>

  <h6 class="text-dark fw-900 d-none">Data Devolução: <span id="dataDevolucaoMalote" class="text-danger fw-500"></span>

  <div id="pendenciasDetalheMalote" class="d-none"></div>
  <div>
    <label class="text-dark fw-900 h6" for="observacaoLojaMalote">Observações Loja:</label>
    <textarea id="observacaoLojaMalote" class="form-control text-uppercase fw-700" style="resize: none;" rows="5"
      placeholder="..." onkeyup="(function(el) { el.value = formataStringComEspaço(el.value); })(this)" readonly></textarea>
  </div>
  <div>
    <label class="text-dark fw-900 h6" for="observacaoFinanceiroMalote">Observações Financeiro:</label>
    <textarea id="observacaoFinanceiroMalote" class="form-control text-uppercase fw-700" style="resize: none;" rows="5"
      placeholder="..." onkeyup="(function(el) { el.value = formataStringComEspaço(el.value); })(this)"
      readonly></textarea>
  </div>
</div>
