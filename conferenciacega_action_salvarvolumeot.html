<div class="form-group">
    <div class="row">
        <div class="col-sm-8 col-xl-8">
            <label class="form-label" for="confitens">Confere Itens</label>
            &nbsp;&nbsp;
            <input type="radio" id="confitens" name="confitens" value="True" > Sim
            &nbsp;&nbsp;
            <input type="radio" id="confitens" name="confitens" value="False" checked> Não
        </div>
        <div class="col-sm-8 col-xl-8">
            <br>
            <label class="form-label" for="qtdvolume">Quantidade</label>
            <input type="number" id="qtdvolume" name="qtdvolume">
        </div>
        <div class="col-sm-8 col-xl-8">
            <br>
            <label class="form-label" for="descvolume">Descrição</label>
            <textarea class="form-control" id="descvolume" name="descvolume" rows="5" maxlength="250"></textarea>
        </div>
    </div>
</div>
