<ol class="breadcrumb page-breadcrumb">
    <li class="breadcrumb-item"><a href="javascript:void(0);">Home</a></li>
    <li class="breadcrumb-item active">Cadastro Campanhas</li>
    <li class="position-absolute pos-top pos-right d-none d-sm-block dataAtual"></li>
</ol>
<div class="subheader">
    <h1 class="subheader-title">
        <i class='subheader-icon fal fa-chart-area'></i> Cadastro de Campanhas
    </h1>
</div>
<div class="row">
    <div class="col-xl-12">
        <div id="panel-1" class="panel">
            <div class="panel-container show">
                <div class="panel-content">

                    <div class="panel-tag">
                        <div class="row">
                            <div class="col-sm-6 col-xl-6">
                                <label class="form-label" for="descCampanha">Descrição da Campanha</label>
                                <div class="input-group">
                                    <input type="text" id="descCampanha" name="descCampanha" class="form-control input" value="">
                                </div>
                            </div>
                            <div class="col-sm-6 col-xl-3">
                                <label class="form-label" for="tpdate">Data Início</label>
                                <input class="form-control" id="dataInicio" type="date" name="dataInicio" value="">
                            </div>
                            <div class="col-sm-6 col-xl-3">
                                <label class="form-label" for="tpdate">Data Fim</label>
                                <input class="form-control" id="dataFinal" type="date" name="dataFinal" value="">
                            </div>
                        </div>
                        </br>
                        <div class="row">
                            <div class="col-sm-6 col-xl-3">
                                <label class="form-label" for="tpempresa">Por Marca</label>
                                <div class="input-group">
                                    <select class="select2 form-control" name="idmarca" id="idmarca">
                                        <option value="0"> </option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-sm-6 col-xl-3">
                                <label class="form-label" for="tpempresa">Por Empresa</label>
                                <div class="input-group">
                                    <select class="select2 form-control" name="idloja" id="idloja" multiple>
                                        <option value="0"> </option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-sm-6 col-xl-3">
                                <label class="form-label" for="percdesc">% Desconto</label>
                                <div class="input-group">
                                    <input class="form-control input" id="percDescontoCampanha" type="text" name="percDescontoCampanha" value="0">
                                </div>
                            </div>
                        </div>
                        </br>
                        <div class="row">
                            <div class="col-sm-3 col-xl-3">
                            <br>
                                <button class="btn btn-success" type="button" onclick="cad_campanha()"><span class="fal fa-plus mr-1"></span>Cadastrar Campanha</button>
                            </div>
                        </div>
                            
                    </div>
                    <div id="resultadoCampanha">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
    <script>
        $("#percDescontoCampanha").mask('#.##0,00', {reverse: true});
    </script>
