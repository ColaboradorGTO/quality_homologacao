<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Distribuição de Compras</title>
        <meta name="description" content="Invoice">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no, minimal-ui">
        <!-- Call App Mode on ios devices -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <!-- Remove Tap Highlight on Windows Phone IE -->
        <meta name="msapplication-tap-highlight" content="no">
        <!-- base css -->
        <!-- Place favicon.ico in the root directory -->
        <link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="img/favicon/favicon-32x32.png">
        <link rel="mask-icon" href="img/favicon/safari-pinned-tab.svg" color="#5bbad5">
    </head>
    <body class="mod-bg-1">
        <style>
            @page{
                size: landscape;
            }
            table{
                font-family: verdana;
                font-size: 10px;
                margin: 0;
                border-collapse: collapse;
                border: solid 1px #000;
                padding:1px;
                margin:0px;
            }
            tr{
                border: solid 1px #000;
                padding:1px;
                margin:0px;
            }
            th{
                vertical-align: bottom;
                text-align: center;
                border: solid 1px #000;
                padding:1px;
                margin:0px;
            }
            td{
                vertical-align: baseline;
                text-align: center;
                border: solid 1px #000;
                padding:1px;
                margin:0px;
            }
        </style>     
        <!-- BEGIN Page Wrapper -->
        <div class="page-wrapper">
            <div class="page-inner">
                <div class="page-content-wrapper">
                    <!-- the #js-page-content id is needed for some plugins to initialize -->
                    <main id="js-page-content" role="main" class="page-content">
                        <div class="subheader">
                            <button type="button" class="btn btn-info btn-xs" title="Imprimir PDF" onclick="printdiv('js-page-content')">Imprimir PDF</button>
                            &nbsp;&nbsp;
                            <button type="button" class="btn btn-success btn-xs" title="Gerar Excel" onclick="printxls()" id="btnExport">Gerar Excel</button>
                        </div>
                        <div id="resultadodistribuicaocompras" >
                        </div>
                    </main>
                    <!-- this overlay is activated only when mobile menu is triggered -->
                    <div class="page-content-overlay" data-action="toggle" data-class="mobile-nav-on">
                    </div>
                    <!-- END Page Content -->
                </div>
            </div>
        </div>
    </body>
</html>
