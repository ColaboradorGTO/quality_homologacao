<ol class="breadcrumb page-breadcrumb">

<div class="row">
    <div class="col-xl-12">
        <div id="panel-1" class="panel">
            <div class="panel-container show">
                <div class="panel-content">

                <div class="panel-tag">
                            <div class="row">
                                <div class="col-sm-6 col-xl-3">
                                    <label class="form-label" for="tpdate">Data Início</label>
                                    <input class="form-control" id="dtconsultainicio" type="date" name="dtconsultainicio" value="">

                                <div class="col-sm-6 col-xl-3">
                                    <label class="form-label" for="tpdate">Data Fim</label>
                                    <input class="form-control" id="dtconsultafim" type="date" name="dtconsultafim" value="">

                            </div>
                            <div class="row">
                                <div class="col-sm-3 col-xl-3">
                                    <label class="form-label" for="tpempresa">Por Marca</label>
                                    <div class="input-group">
                                        <select class="select2 form-control" name="idmarca" id="idmarca" onChange="selecionamarca();">

                                        </select>
                                    </div>
                                </div>
                                <div class="col-sm-3 col-xl-3">
                                    <label class="form-label" for="tpgrade">Grupo</label>
                                    <div class="input-group">
                                        <select class="selectpicker" data-width="100%" id="idgrupograde"
                                                name="idgrupograde"

                                            <option value=""></option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-sm-3 col-xl-3">
                                    <label class="form-label" for="tpgrade">Subgrupo</label>
                                    <div class="input-group">
                                        <select class="select2-placeholder-multiple form-control" data-width="100%" id="idgrade"
                                                name="idgrade"
                                                multiple="multiple"
                                                data-live-search="true" data-live-search-placeholder="Pesquisar"
                                                data-actions-box="true"
                                                >
                                            <option value=""></option>
                                        </select>
                                    </div>
                                </div>
                            </div>    
                            <div class="row">
                                <div class="col-sm-8 col-xl-8">
                                <br>
                                        <button class="btn btn-primary" type="button" onclick="pesq_vendas_estoque_grupo_subgrupo(1)"><span class="fal fa-search mr-1"></span>Pesquisar</button>
