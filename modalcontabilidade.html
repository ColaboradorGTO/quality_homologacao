<!-- Modal Fechamento Caixa Lojas-->
<div class="modal fade" id="fechamentoLojas" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-xl" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">
          Detalhe de Fechamento
          <small class="m-0 text-muted">
            Relação de Recebimentos do Fechamento da Loja
          </small>
        </h4>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true"><i class="fal fa-times"></i></span>
        </button>
      </div>
      <form id="formFechamentoLoja" name="formFechamentoLoja" method="post" enctype="multipart/form-data"
        onsubmit="return false;">
        <fieldset>
          <div class="modal-body" id="resulmodalfechamentoloja">

          </div>
          <div class="modal-footer" id="footerfechamentoloja">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Fechar</button>
          </div>
        </fieldset>
      </form>
    </div>
  </div>
</div>
