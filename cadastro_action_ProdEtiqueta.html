<ol class="breadcrumb page-breadcrumb">
  <input type="hidden" name="Tipo" id="Tipo" value="">
  <li class="breadcrumb-item"><a href="dashboardadministrativo.html">Home</a></li>
  <li class="breadcrumb-item active"> Etiquetagem </li>
  <li class="position-absolute pos-top pos-right d-none d-sm-block dataAtual"></li>
</ol>
<div class="subheader">
  <h1 class="subheader-title DescTituloVoucher">
    <i class='subheader-icon fal fa-chart-area'></i>Etiquetagem <span class='fw-300'></span>
  </h1>
</div>
<div class="row">
  <div class="col-xl-12">
    <div id="panel-1" class="panel">
      <div class="panel-hdr">
        <h2>
          <span class="fw-300"><i> Produtos</i></span>
        </h2>
      </div>
      <div class="panel-container show">
        <div class="panel-content">
          <div class="panel-tag">
            <div id="avisoPesquisa" class="d-none"></div>
            <div class="row">
              <div class="col-sm-3 col-xl-3">
                <label class="form-label" for="idListaPreco">Lista de Preço</label>
                <select class="form-control" id="idListaPreco" type="text" name="Id do Produto" value="" style="height: 39px;">
                  <option value="">Selecione...</option>
                  <option   title="GRUPO" value="0">TODOS</option>
                </select>
              </div>
              <div class="col-sm-3 col-xl-3">
                <label class="form-label" for="idProdEtiqueta">Id. Produto</label>
                <input class="form-control" id="idProdEtiqueta" type="text" name="Id do Produto" value="" placeholder="Id do Produto" style="height: 39px;">
              </div>
              <div class="col-sm-3 col-xl-3">
                <label class="form-label" for="descProdEtiqueta">Descrição</label>
                <input class="form-control" id="descProdEtiqueta" type="text" name="Id do Produto" value="" placeholder="Descrição do Produto" style="height: 39px;">
              </div>
              <div class="col-sm-3 col-xl-3">
                <label class="form-label" for="codBarrasProdEtiqueta">Cod.Barras</label>
                <input class="form-control" id="codBarrasProdEtiqueta" type="text" name="Codigo de Barras do Produto" value="" placeholder="Código de Barras" style="height: 39px;">
              </div>
              <div class="col-sm-3 col-xl-3 d-none">
                <label class="form-label" for="numPedidoEtiqueta">Nº Pedido</label>
                <div class="input-group">
                  <select class="form-control" name="Número do Pedido" id="numPedidoEtiqueta">
                    <option value="0">Selecione...</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-sm-12 col-xl-12">
                <br>
                <button class="btn btn-primary" type="button" onclick="pesquisaProdutos()">
                  <span class="fal fa-search mr-1"></span>Pesquisar
                </button>

                <button id="btnAcumuladorImpEtiqueta" class="btn btn-success d-none" type="button" onclick="acumuladorImpEtiquetas()">
                  <span class="fal fa-download mr-1"></span>Guardar
                </button>

                <button id="btnImpEtiqueta" class="btn btn-info d-none" type="button" onclick="listarProdsParaImprimir()">
                  <span class="fal fa-print mr-1"></span>Imprimir
                </button>

                <button id="btnDeletarAcumuladorImpEtiquetas" class="btn btn-danger d-none" type="button" onclick="deletarAcumuladorImpEtiquetas()">
                  <span class="fal fa-trash mr-1"></span>Limpar Histórico
                </button>
              </div>
            </div>
          </div>
          <div id="resultado">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
