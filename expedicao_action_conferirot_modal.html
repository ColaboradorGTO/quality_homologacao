<div id="resultadocadestrutura"></div>

<div class="form-group">
    <div class="row">
        <div class="col-sm-6 col-xl-6">
            <!-- Loja Origem -->
            <label class="form-label" for="tploja">Loja Origem</label>
            <div class="input-group">
                <select class="select2 form-control" name="idlojaorigemmodal" id="idlojaorigemmodal">
                    <option value="-1">Selecione a Loja Origem</option>
                </select>
            </div>
        </div>
        <div class="col-sm-6 col-xl-6">
            <!-- Loja Destino -->
            <label class="form-label" for="tploja">Loja Destino</label>
            <div class="input-group">
                <select class="select2 form-control" name="idlojadestinomodal" id="idlojadestinomodal">
                    <option value="-2">Selecione a Loja Destino</option>
                </select>
            </div>
        </div>
    </div>
    <br>
    <div class="row">
        <div class="col-sm-6 col-xl-4">
            <label class="form-label" for="dsProduto">Produto</label>
            <div class="input-group">
                <input type="number" id="descProduto" onchange="confpesqProduto(1)" name="descProduto" class="form-control input" value="">&nbsp;&nbsp;
            </div>
        </div>
        <div class="col-sm-6 col-xl-4">
            <label class="form-label" for="dsObservacao">Observação</label>
            <div class="input-group">
                <textarea class="form-control" id="descobservacao" name="descobservacao" rows="5" maxlength="200" value=""></textarea>
            </div>
        </div>
    </div>
    <br>
    <div class="row">
        <div class="col-sm-8 col-xl-8">
            <button class="btn btn-info" type="button" onclick="salvarconfot()" id="salvarot"><span class="fal fa-save mr-1"></span>Salvar</button>
            <button class="btn btn-success" type="button" onclick="finalizarconfot()" id="finalizarconfot"><span class="fal fa-check mr-1"></span>Finalizar Conferência</button>
        </div>
        <div class="col-sm-8 col-xl-8">
            <label class="form-label" style="color: red">Para finalizar a Conferência, favor clicar no botão Finalizar Conferência!</label>
        </div>
    </div>
</div>

<table id="tabelaprodutos" class="table table-bordered table-hover table-striped w-100" style="width:100%">
    <thead class="bg-primary-600">
        <tr>
            <th width="15%">Produto</th>
            <th width="15%">Cód. Barras</th>
            <th width="45%">Descrição</th>
            <th width="10%">R$ Venda</th>
            <th width="10%">Qtd</th>
            <th width="10%">Qtd Conferida</th>
            <th width="5%">Opções</th>
        </tr>
    </thead>
</table>
