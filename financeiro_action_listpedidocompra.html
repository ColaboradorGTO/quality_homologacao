    <div class="col-xl-12">
        <div id="panel-1" class="panel">
            <div class="panel-container show">

                    <div class="row">
                        <div class="col-sm-2 col-xl-2">

                            <div class="input-group">
                                <select class="select2" data-width="100%" id="idmarcaselect"
                                        name="idmarcaselect"
                                        data-live-search="true" data-live-search-placeholder="Pesquisar"
                                        data-actions-box="true">
                                    <option value=""></option>
                                </select>
                            </div>
                        </div> 
                        <div class="col-sm-3 col-xl-3">
                            <label class="form-label" for="tpfornec">Por Fornecedor</label>
                            <div class="input-group">
                                <select class="select2" data-width="100%" id="idfornselect"
                                        name="idfornselect"

                                        data-actions-box="true">
                                    <option value=""></option>
                                </select>
                            </div>
                        </div>
                        <div class="col-sm-1 col-xl-1">

                            <input class="form-control" id="npedio" type="text" name="npedio" onkeypress="return Onlynumbers(event);" value="">
                            
                        </div>
                        <div class="col-sm-2 col-xl-2">

                            <input class="form-control" id="parametro_dia_inicio" type="date" name="parametro_dia_inicio" value="">

                        <div class="col-sm-2 col-xl-2">
                            <label class="form-label" for="fimdt">Data Fim</label>
                            <input class="form-control" id="parametro_dia_fim" type="date" name="parametro_dia_fim" value="">

                        <div class="col-sm-2 col-xl-2">
                            <br>
                            <button type="button" class="btn btn-primary" title="Pesquisar Pedidos" onclick="pesq_pedidos(1)" ><span class="fal fa-search mr-1"></span>ATUALIZAR DADOS</button>
                        </div>
                    </div>
                    </div>
                    <div class="panel-container show">
                        <div class="panel-content">
                            <div id="resultadoListaPedido">
                                <!-- datatable start -->
