<!-- Modal Detalhar Venda-->
<div class="modal fade" id="detVenda" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-right modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title">
                    Detalhe da Venda
                    <small class="m-0 text-muted">
                        Relação de Produtos da Venda
                    </small>
                </h4>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true"><i class="fal fa-times"></i></span>
                </button>
            </div>
            <form id="formDetVenda" name="formDetVenda" method="post" enctype="multipart/form-data" onsubmit="return false;">
                <fieldset>
                    <div class="modal-body" id="resulmodaldetvenda">

                    </div>
                    <div class="modal-footer" id="footerdetvenda">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Fechar</button>
                    </div>
                </fieldset>
            </form> 
        </div>
    </div>
</div>
