          <div class="panel-tag">
            <div class="row">
              <div class="col-sm-6 col-xl-3">
                <label class="form-label" for="idSelectBanco">Bancos</label>
                <div class="input-group">
                  <select class="select2 form-control" name="idSelectBanco" id="idSelectBanco" onchange="buscarContasDoBancoSelecionado(this.value)">

                    <option>Selecione...</option>
                  </select>
                </div>
              </div>-->

              </div>

            <div class="row">

                <br>
                <button class="btn btn-primary" type="button" onclick="pesquisarContaBanco()"><span
                    class="fal fa-search mr-1"></span>Pesquisar</button>
                <button class="btn btn-info" type="button" onclick="abrirModalContaBanco()"><span
                    class="fal fa-plus mr-1"></span>Cadastrar</button>
