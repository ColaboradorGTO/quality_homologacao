<ol class="breadcrumb page-breadcrumb">
  <input type="hidden" name="Tipo" id="Tipo" value="">
  <li class="breadcrumb-item"><a href="javascript:void(0);">Home</a></li>
  <li class="breadcrumb-item active">Quebra de Caixas</li>
  <li class="position-absolute pos-top pos-right d-none d-sm-block dataAtual"></li>
</ol>
<div class="subheader">
  <h1 class="subheader-title DescTituloQuebraCaixa">
    <i class='subheader-icon fal fa-chart-area'></i> Quebra de Caixas <span class='fw-300'></span>
  </h1>
</div>
<div class="row">
  <div class="col-xl-12">
    <div id="panel-1" class="panel">
      <div class="panel-hdr">
        <h2>
          Pesquisa <span class="fw-300"><i> Por Período</i></span>
        </h2>
      </div>
      <div class="panel-container show">
        <div class="panel-content">
          <div class="panel-tag">
            <div class="row">
              <div class="col-sm-2 col-xl-2">
                <label class="form-label" for="iduf">UF</label>
                <div class="input-group">
                  <select class="select2 form-control" name="iduf" id="iduf" onChange="carregarEmpresasPorMarcaUF();">
                    <option value="">Todos</option>
                    <option value="DF">DF</option>
                    <option value="GO">GO</option>
                  </select>
                </div>
              </div>
              <div class="col-sm-3 col-xl-3">
                <label class="form-label" for="idmarca">Por Marca</label>
                <div class="input-group">
                  <select class="select2 form-control" name="idmarca" id="idmarca" onChange="carregarEmpresasPorMarcaUF();">
                    <option value="">Selecione...</option>
                  </select>
                </div>
              </div>
              <div id="divEmpresa" class="col-sm-4 col-xl-4">
                <label class="form-label" for="idloja">Empresa</label>
                <div class="input-group">
                  <select class="select2 form-control" name="idloja" id="idloja">
                    <option value="0">Selecione...</option>

                  </select>
                </div>
              </div>
              <div class="col-sm-2 col-xl-2">
                <label class="form-label" for="stQuebraPositvaNegativa">Tipo Quebra</label>
                <div class="input-group">
                  <select class="select2 form-control" name="stQuebraPositvaNegativa" id="stQuebraPositvaNegativa">
                    <option value="">Todas</option>
                    <option value="Positiva">Positiva</option>
                    <option value="Negativa">Negativa</option>
                  </select>
                </div>
              </div>
            </div>
            <br>
            <div class="row">
              <div class="col-sm-2 col-xl-2">
                <label class="form-label" for="dtInicio">Data Início</label>
                <input class="form-control" id="dtInicio" type="date" name="dtInicio" value="">
              </div>
              <div class="col-sm-2 col-xl-2">
                <label class="form-label" for="dtFim">Data Fim</label>
                <input class="form-control" id="dtFim" type="date" name="dtFim" value="">
              </div>
              <div class="col-sm-2 col-xl-2">
                <label class="form-label" for="cpfOperador">CPF Operador</label>
                <input class="form-control" id="cpfOperador" type="text" name="cpfOperador" value=""
                  onkeyup="this.value = maskCpf(this.value)" autocomplete="off" maxLength="14">
              </div>
            </div>
            <div class="row">
              <div class="col-sm-6 col-xl-6">
                <br>
                <button class="btn btn-primary" type="button" onclick="pesquisarQuebrasDeCaixa()"><span
                    class="fal fa-search mr-1"></span>Pesquisar</button>
              </div>
              <div class="col-sm-6 col-xl-6">
                <br>

                <div id="btnConferirTodasQuebrasCaixaSelecionadas" class="justify-content-end d-none">
                  <button class="btn btn-warning fw-900" type="button"
                    onclick="modalConferirTodasQuebrasCaixaSelecionadas()">
                    <span class="fal fa-check fw-900 mr-1"></span>Conferir Todos</button>
                </div>
              </div>
            </div>
            <div class="row">
            </div>
          </div>
          <div id="resultado">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
