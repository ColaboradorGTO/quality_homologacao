$(document).ready(function(){

    window.onkeypress = function(e) {
        if (e.which == 13) {
            var inputs = document.getElementsByClassName(' input');
            for (var i = 0; i < inputs.length; i++) {
                if (document.activeElement.id == inputs[i].id && i+1 < inputs.length ) {
                    inputs[i+1].focus();
                    inputs[i+1].select();
                    break;   
                }
            }
        }
    };

});
